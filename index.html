<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Gallery</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>My Image Gallery</h1>
    <p>Enter 5 image URLs below and click <strong>Show Images</strong>.</p>

    <form id="image-form">
      <div class="input-grid">
        <label>
          Image 1
          <input type="url" id="image-url-1" placeholder="https://example.com/image1.jpg" />
        </label>
        <label>
          Image 2
          <input type="url" id="image-url-2" placeholder="https://example.com/image2.jpg" />
        </label>
        <label>
          Image 3
          <input type="url" id="image-url-3" placeholder="https://example.com/image3.jpg" />
        </label>
        <label>
          Image 4
          <input type="url" id="image-url-4" placeholder="https://example.com/image4.jpg" />
        </label>
        <label>
          Image 5
          <input type="url" id="image-url-5" placeholder="https://example.com/image5.jpg" />
        </label>
      </div>

      <button type="submit">Show Images</button>
    </form>

    <section id="gallery" class="gallery"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
